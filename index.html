<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>نظام الاختبارات المقالي | الأسئلة والطباعة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', 'Roboto', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e9eff7 0%, #d9e2ef 100%);
            min-height: 100vh;
            padding: 40px 24px;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* لوحة التحرير */
        .editor-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,240,0.8);
        }

        .form-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #bfd3ec;
        }

        .input-group {
            flex: 1 1 190px;
            min-width: 170px;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            border: 1px solid #cbdbe6;
            background: white;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #2b6a9f;
            box-shadow: 0 0 0 3px rgba(43,106,159,0.15);
        }

        .questions-editor-area {
            margin-top: 1rem;
        }

        .question-item {
            background: #f8fbfe;
            margin-bottom: 1rem;
            padding: 1rem 1.2rem;
            border-radius: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            flex-wrap: wrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border-right: 5px solid #2c6e9e;
        }

        .question-number {
            background: #2c6e9e;
            color: white;
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .question-text {
            flex: 8;
            min-width: 220px;
        }

        .question-text textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 1.2rem;
            border: 1px solid #c9dcf0;
            resize: vertical;
            font-size: 0.95rem;
            background: white;
            font-family: inherit;
        }

        .remove-question {
            background: #ffe6e6;
            border: none;
            color: #b81c2c;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .remove-question:hover {
            background: #ffcece;
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(95deg, #1f4a76, #2c628f);
            border: none;
            padding: 0.7rem 1.6rem;
            border-radius: 2.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            margin-left: 0.8rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            background: linear-gradient(95deg, #143b5c, #1f547c);
        }

        .btn-secondary {
            background: #edf3fc;
            border: 1px solid #bed0ea;
            padding: 0.7rem 1.6rem;
            border-radius: 2.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #1e4668;
        }

        .btn-secondary:hover {
            background: #e0e9f5;
            transform: scale(0.98);
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #cbdfef;
        }

        .warning-limit {
            color: #c25a2c;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        /* ورقة الاختبار النهائية (معاينة + الطباعة) */
        .preview-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1f3a57;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .exam-paper {
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            padding: 2rem 2rem 2.5rem 2rem;
            width: 100%;
            transition: all 0.2s;
        }

        /* صف معلومات الاختبار + اسم الطالب - تصميم رمادي فاتح */
        .exam-info-block {
            background: #edf2f9;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid #d9e4f0;
            box-shadow: inset 0 1px 2px #fff, 0 2px 4px rgba(0,0,0,0.02);
        }

        .info-row-top {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .info-chip {
            background: #ffffffcc;
            backdrop-filter: blur(2px);
            padding: 0.45rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            color: #1a2f47;
            font-size: 0.85rem;
        }

        .info-chip strong {
            font-weight: 800;
            margin-left: 6px;
            color: #0f3b5c;
        }

        .student-name-field {
            background: #ffffffcc;
            padding: 0.45rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .student-name-field span {
            font-weight: 800;
            color: #0f3b5c;
        }

        .student-name-value {
            min-width: 140px;
            border-bottom: 1px dashed #7689a8;
            display: inline-block;
            padding: 0 0.2rem;
            color: #1f476b;
        }

        .questions-list-preview {
            display: flex;
            flex-direction: column;
            gap: 1.3rem;
        }

        .preview-question {
            border-bottom: 1px dashed #cfdeef;
            padding-bottom: 0.8rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
        }

        .preview-q-num {
            background: #eef2ff;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            color: #2c6e9e;
            font-weight: 800;
            flex-shrink: 0;
        }

        .preview-q-text {
            font-size: 1rem;
            line-height: 1.5;
            color: #1e2f3f;
            font-weight: 500;
            white-space: pre-wrap;
            word-break: break-word;
            flex: 1;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .editor-panel, .action-bar, .preview-title, .btn-primary, .btn-secondary, .no-print {
                display: none !important;
            }
            .exam-paper {
                box-shadow: none;
                padding: 0.7cm;
                border-radius: 0;
            }
            .exam-info-block {
                background: #e6edf6 !important;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }
            .preview-question {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            @page {
                size: A4;
                margin: 1.2cm;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            color: #2e577b;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- قسم تحرير الاختبار -->
    <div class="editor-panel no-print">
        <h2 style="color:#1e3a5f; margin-bottom: 1rem;">📋 إنشاء اختبار مقالات احترافي</h2>
        <div class="form-grid">
            <div class="input-group">
                <label>📌 اسم الاختبار</label>
                <input type="text" id="examName" placeholder="مثال: اختبار الفصل الدراسي" value="الاختبار التحريري">
            </div>
            <div class="input-group">
                <label>📚 المادة</label>
                <input type="text" id="subject" placeholder="الرياضيات / العلوم" value="اللغة العربية وآدابها">
            </div>
            <div class="input-group">
                <label>📅 الفصل الدراسي</label>
                <input type="text" id="semester" value="الفصل الدراسي الأول">
            </div>
            <div class="input-group">
                <label>🏫 اسم المدرسة</label>
                <input type="text" id="schoolName" value="مدارس الفرسان العالمية">
            </div>
            <div class="input-group">
                <label>👤 اسم الطالب</label>
                <input type="text" id="studentName" placeholder="اسم الطالب / الطالبة" value="_________________">
            </div>
        </div>

        <div class="questions-editor-area">
            <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 12px;">
                <h3 style="color:#1f4970;">✍️ الأسئلة المقالية</h3>
                <span id="questionCounterDisplay" style="background:#eef2fa; padding: 5px 16px; border-radius: 50px;">0 / 15</span>
            </div>
            <div id="dynamicQuestionsContainer"></div>
            <div class="action-bar">
                <button id="addQuestionBtn" class="btn-primary">➕ إضافة سؤال</button>
                <button id="exportImageBtn" class="btn-primary">🖼️ تصدير صورة (PNG)</button>
                <button id="exportPdfBtn" class="btn-primary">📑 تصدير PDF</button>
                <button id="printBtn" class="btn-secondary">🖨️ طباعة الورقة</button>
            </div>
            <div id="maxWarning" class="warning-limit"></div>
        </div>
    </div>

    <!-- معاينة الورقة (تظهر المعلومات + اسم الطالب + الأسئلة) -->
    <div class="preview-title no-print">
        <span>📄 ورقة الأسئلة النهائية (جاهزة للطباعة/التصدير)</span>
    </div>
    <div id="examPaperPreview" class="exam-paper">
        <div style="text-align:center; padding:2rem;">جاري تحميل المعاينة...</div>
    </div>
    <footer class="no-print">✧ حد أقصى 15 سؤالاً في الصفحة الواحدة | تصميم معلومات رمادي فاتح مع اسم الطالب ✧</footer>
</div>

<script>
    // قائمة الأسئلة (نصوص)
    let questionsList = [
        "اشرح أسباب ازدهار الحضارة الإسلامية في العصر العباسي، مع ذكر مثالين.",
        "ما أثر التقنيات الحديثة على تطوير التعليم؟ ناقش بإيجاز."
    ];

    // عناصر DOM للتحرير والمعاينة
    const container = document.getElementById('dynamicQuestionsContainer');
    const examPreviewDiv = document.getElementById('examPaperPreview');
    const addBtn = document.getElementById('addQuestionBtn');
    const exportImageBtn = document.getElementById('exportImageBtn');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const printBtn = document.getElementById('printBtn');
    const maxWarningSpan = document.getElementById('maxWarning');
    const questionCounterSpan = document.getElementById('questionCounterDisplay');

    // حقول الإدخال
    const examNameInput = document.getElementById('examName');
    const subjectInput = document.getElementById('subject');
    const semesterInput = document.getElementById('semester');
    const schoolNameInput = document.getElementById('schoolName');
    const studentNameInput = document.getElementById('studentName');

    // دوال التحديث الأساسية
    function updateMaxLimit() {
        const len = questionsList.length;
        questionCounterSpan.innerText = `${len} / 15`;
        if (len >= 15) {
            maxWarningSpan.innerText = "⚠️ الحد الأقصى 15 سؤال، تم الوصول للنهاية. لا يمكن إضافة المزيد.";
            addBtn.disabled = true;
            addBtn.style.opacity = "0.6";
            addBtn.style.cursor = "not-allowed";
        } else {
            maxWarningSpan.innerText = "";
            addBtn.disabled = false;
            addBtn.style.opacity = "1";
            addBtn.style.cursor = "pointer";
        }
    }

    // عرض المحرر مع textareas قابلة للكتابة (تم إصلاح المشكلة)
    function renderQuestionsEditor() {
        if (!container) return;
        container.innerHTML = '';
        for (let i = 0; i < questionsList.length; i++) {
            const qDiv = document.createElement('div');
            qDiv.className = 'question-item';
            qDiv.setAttribute('data-idx', i);
            
            const numberSpan = document.createElement('span');
            numberSpan.className = 'question-number';
            numberSpan.innerText = i + 1;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'question-text';
            const textarea = document.createElement('textarea');
            textarea.rows = 2;
            textarea.placeholder = `نص السؤال المقالي رقم ${i+1} ...`;
            textarea.value = questionsList[i];
            // ربط التغيير مع تحديث مصفوفة الأسئلة والمعاينة
            textarea.addEventListener('input', (function(index) {
                return function(e) {
                    questionsList[index] = e.target.value;
                    renderPreview();          // تحديث المعاينة فوراً
                };
            })(i));
            
            textDiv.appendChild(textarea);
            
            const removeBtn = document.createElement('button');
            removeBtn.innerText = '✖ حذف';
            removeBtn.className = 'remove-question';
            removeBtn.addEventListener('click', (function(idx) {
                return function() {
                    if (questionsList.length === 1) {
                        alert("لا يمكن حذف جميع الأسئلة، يجب أن يبقى سؤال واحد على الأقل.");
                        return;
                    }
                    questionsList.splice(idx, 1);
                    renderQuestionsEditor();   // إعادة بناء المحرر
                    updateMaxLimit();
                    renderPreview();
                };
            })(i));
            
            qDiv.appendChild(numberSpan);
            qDiv.appendChild(textDiv);
            qDiv.appendChild(removeBtn);
            container.appendChild(qDiv);
        }
    }

    // إضافة سؤال جديد
    function addNewQuestion() {
        if (questionsList.length >= 15) {
            alert("لا يمكن إضافة أكثر من 15 سؤالاً في الصفحة الواحدة (لضمان التصميم الأنيق).");
            return;
        }
        questionsList.push("سؤال مقالي جديد: اذكر أسباب وأهمية الموضوع مع التفصيل...");
        renderQuestionsEditor();
        updateMaxLimit();
        renderPreview();
    }

    // دالة الهروب من الـ HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // المعاينة النهائية: معلومات الاختبار (رمادي فاتح) + اسم الطالب وأسفلها الأسئلة
    function renderPreview() {
        const examName = examNameInput.value.trim() || "اختبار غير محدد";
        const subject = subjectInput.value.trim() || "—";
        const semester = semesterInput.value.trim() || "—";
        const schoolName = schoolNameInput.value.trim() || "المدرسة";
        let studentName = studentNameInput.value.trim();
        if (studentName === "") studentName = "__________";
        
        // بناء كتلة المعلومات العليا ( رمادي فاتح مختلف عن الأسئلة )
        const infoHTML = `
            <div class="exam-info-block">
                <div class="info-row-top">
                    <div class="info-chip"><strong>📋 الاختبار:</strong> ${escapeHtml(examName)}</div>
                    <div class="info-chip"><strong>📖 المادة:</strong> ${escapeHtml(subject)}</div>
                    <div class="info-chip"><strong>🗓️ الفصل:</strong> ${escapeHtml(semester)}</div>
                    <div class="info-chip"><strong>🏫 المدرسة:</strong> ${escapeHtml(schoolName)}</div>
                </div>
                <div class="student-name-field">
                    <span>👨‍🎓 اسم الطالب/الطالبة :</span>
                    <span class="student-name-value">${escapeHtml(studentName)}</span>
                </div>
            </div>
        `;
        
        // بناء الأسئلة المقالية
        let questionsHTML = `<div class="questions-list-preview">`;
        if (!questionsList.length) {
            questionsHTML += `<div style="padding: 2rem; text-align:center; color:#6f8fae;">⚠️ لا توجد أسئلة بعد، أضف أسئلة من لوحة التحرير.</div>`;
        } else {
            questionsList.forEach((qText, idx) => {
                const displayText = qText.trim() === "" ? "(السؤال غير مكتوب بعد)" : qText;
                questionsHTML += `
                    <div class="preview-question">
                        <div class="preview-q-num">${idx+1}</div>
                        <div class="preview-q-text">${escapeHtml(displayText)}</div>
                    </div>
                `;
            });
        }
        questionsHTML += `</div>`;
        
        // إضافة مساحة للإجابة المقالية بشكل أنيق (اختياري)
        const answerSpace = `<div style="margin-top: 2rem; border-top: 1px solid #e2edf7; padding-top: 1rem; font-size:0.8rem; color:#6a85a3;">✍️ مساحة الإجابة: يمكن للطالب الإجابة على ورقة منفصلة أو أسفل كل سؤال.</div>`;
        
        const finalRender = infoHTML + questionsHTML + answerSpace;
        examPreviewDiv.innerHTML = finalRender;
    }

    // ربط الأحداث للتغيير الفوري بالمعاينة
    function bindPreviewEvents() {
        examNameInput.addEventListener('input', () => renderPreview());
        subjectInput.addEventListener('input', () => renderPreview());
        semesterInput.addEventListener('input', () => renderPreview());
        schoolNameInput.addEventListener('input', () => renderPreview());
        studentNameInput.addEventListener('input', () => renderPreview());
    }
    
    // تصدير صورة من منطقة المعاينة باستخدام html2canvas
    async function exportAsImage() {
        const element = document.getElementById('examPaperPreview');
        if (!element) return;
        try {
            const canvas = await html2canvas(element, {
                scale: 2.8,
                backgroundColor: '#ffffff',
                logging: false,
                useCORS: false
            });
            const link = document.createElement('a');
            link.download = `ورقة_اختبار_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch (err) {
            console.error(err);
            alert("حدث خطأ أثناء إنشاء الصورة، تأكد من اتصال المكتبات.");
        }
    }
    
    // تصدير PDF بدقة عالية
    async function exportAsPDF() {
        const element = document.getElementById('examPaperPreview');
        if (!element) return;
        try {
            const originalBtnText = exportPdfBtn.innerText;
            exportPdfBtn.innerText = "⏳ جاري تحضير PDF...";
            exportPdfBtn.disabled = true;
            const canvas = await html2canvas(element, {
                scale: 2.5,
                backgroundColor: '#ffffff',
                logging: false
            });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const imgWidth = 210; // عرض A4 بالملم
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let pdf = new jsPDF('p', 'mm', 'a4');
            let position = 0;
            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
            let heightLeft = imgHeight - pageHeight;
            while (heightLeft > 0) {
                position = heightLeft - imgHeight;
                pdf.addPage();
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pageHeight;
            }
            pdf.save(`الاختبار_${new Date().toISOString().slice(0,19)}.pdf`);
            exportPdfBtn.innerText = originalBtnText;
            exportPdfBtn.disabled = false;
        } catch (err) {
            exportPdfBtn.innerText = "📑 تصدير PDF";
            exportPdfBtn.disabled = false;
            alert("فشل تصدير الـ PDF: " + err.message);
        }
    }
    
    // طباعة الورقة مباشرة مع تصميم A4
    function printPreview() {
        const previewContent = document.getElementById('examPaperPreview').cloneNode(true);
        const printWindow = window.open('', '_blank');
        printWindow.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>ورقة الاختبار - للطباعة</title><style>');
        printWindow.document.write(`
            * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Cairo', sans-serif; direction: rtl; }
            body { padding: 0.7cm; background: white; }
            .exam-paper { max-width: 100%; margin: 0 auto; }
            .exam-info-block { background: #edf2f9; border-radius: 1.2rem; padding: 0.8rem 1.2rem; margin-bottom: 1.8rem; border: 1px solid #cfdfef; }
            .info-row-top { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 0.6rem; margin-bottom: 0.8rem; }
            .info-chip { background: #ffffffcc; padding: 0.3rem 1rem; border-radius: 2rem; font-size: 0.8rem; }
            .student-name-field { background: #ffffffcc; padding: 0.3rem 1rem; border-radius: 2rem; display: inline-block; }
            .student-name-value { border-bottom: 1px dashed #4d6a8f; min-width: 120px; display: inline-block; }
            .questions-list-preview { display: flex; flex-direction: column; gap: 1rem; }
            .preview-question { display: flex; gap: 0.8rem; border-bottom: 1px dashed #bbd0e8; padding-bottom: 0.6rem; align-items: flex-start; }
            .preview-q-num { background: #eef2ff; width: 30px; height: 30px; border-radius: 30px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; }
            .preview-q-text { font-size: 1rem; line-height: 1.4; }
            @media print { body { margin:0; padding:0.6cm; } }
        `);
        printWindow.document.write('</style></head><body>');
        printWindow.document.write('<div class="exam-paper">');
        printWindow.document.write(previewContent.innerHTML);
        printWindow.document.write('</div></body></html>');
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
    }
    
    // تهيئة عامة
    function init() {
        bindPreviewEvents();
        renderQuestionsEditor();
        updateMaxLimit();
        renderPreview();
        
        // ربط الأزرار
        addBtn.addEventListener('click', addNewQuestion);
        exportImageBtn.addEventListener('click', exportAsImage);
        exportPdfBtn.addEventListener('click', exportAsPDF);
        printBtn.addEventListener('click', printPreview);
    }
    
    init();
</script>
</body>
