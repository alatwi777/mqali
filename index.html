
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متوسطة الحسين بن علي - نظام الاختبارات</title>
    <!-- html2canvas و jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8eff8, #d4e0ec);
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        /* التبويبات */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .tab-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #1f4a76;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #1f4a76;
            color: white;
        }
        .tab-pane {
            display: none;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .tab-pane.active {
            display: block;
        }
        /* حقول الإدخال */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #c0d4ec;
        }
        .field {
            flex: 1;
            min-width: 170px;
        }
        .field label {
            display: block;
            font-weight: bold;
            color: #1e3a5f;
            margin-bottom: 6px;
            font-size: 0.85rem;
        }
        .field input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 30px;
            border: 1px solid #c7d8ec;
            background: white;
            font-size: 0.9rem;
        }
        /* الأسئلة */
        .questions-list {
            margin-top: 20px;
        }
        .question-card {
            background: #f9fcff;
            border-right: 5px solid #2c6e9e;
            border-radius: 20px;
            padding: 12px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }
        .q-num {
            background: #2c6e9e;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .q-text {
            flex: 1;
            min-width: 200px;
        }
        .q-text textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: 18px;
            border: 1px solid #cde0f0;
            resize: vertical;
            font-size: 0.9rem;
        }
        .btn-delete {
            background: #ffe0e0;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: #b91c2c;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(95deg, #1f4a76, #2c628f);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            margin-left: 10px;
        }
        .btn-secondary {
            background: #eef2fa;
            border: 1px solid #b9ceec;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #1e4668;
        }
        .action-bar {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #cfdfef;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .preview-area {
            margin-top: 30px;
        }
        .preview-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #1f3a57;
        }
        .exam-sheet {
            background: white;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        /* تنسيق ورقة الاختبار */
        .info-box {
            background: #ecf2f9;
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .info-items {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .info-badge {
            background: #ffffffcc;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .score-box {
            background: white;
            border-radius: 16px;
            padding: 5px 15px;
            text-align: center;
            border: 1px solid #bdd2ea;
        }
        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .numerator {
            border-bottom: 2px solid #2c6e2c;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0 8px;
            min-width: 50px;
            text-align: center;
        }
        .student-row {
            background: #f5f9fe;
            border-radius: 16px;
            padding: 10px 18px;
            margin-bottom: 20px;
        }
        .answer-header {
            font-size: 1rem;
            font-weight: bold;
            border-right: 4px solid #2c6e9e;
            padding-right: 10px;
            margin: 15px 0 12px 0;
        }
        .preview-question {
            display: flex;
            gap: 12px;
            border-bottom: 1px dashed #cfdeef;
            padding-bottom: 10px;
            margin-bottom: 12px;
        }
        .preview-num {
            background: #eef2ff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        /* قائمة الاختبارات المحفوظة */
        .exam-card {
            background: white;
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid #dce5f0;
        }
        .small-btn {
            background: #eef2fa;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .small-btn.print { background: #2c628f; color: white; }
        .small-btn.pdf { background: #1f4a76; color: white; }
        .small-btn.delete { background: #dc3545; color: white; }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #6f8fae;
        }
        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.75rem;
            color: #2e577b;
        }
        @media print {
            .tabs, .action-bar, .btn-primary, .btn-secondary, .saved-section, footer, .no-print { display: none; }
            .exam-sheet { box-shadow: none; padding: 0.5cm; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- أزرار التبويب -->
    <div class="tabs no-print">
        <button class="tab-btn active" onclick="showTab('create')">📝 إنشاء اختبار جديد</button>
        <button class="tab-btn" onclick="showTab('saved')">📚 الاختبارات التي أنشأتها</button>
    </div>

    <!-- تبويب إنشاء الاختبار -->
    <div id="tab-create" class="tab-pane active">
        <div class="editor-panel" style="background: rgba(255,255,255,0.96); border-radius: 28px; padding: 20px;">
            <h2 style="color:#1e3a5f;">📝 متوسطة الحسين بن علي | منشئ الاختبارات <span style="font-size:0.7rem; background:#e0f0ea; padding:2px 8px; border-radius:20px;">💾 حفظ تلقائي</span></h2>
            
            <!-- معلومات الاختبار -->
            <div class="form-row">
                <div class="field"><label>📌 اسم الاختبار</label><input type="text" id="examName" value="الاختبار النهائي"></div>
                <div class="field"><label>📚 المادة</label><input type="text" id="subject" value="التربية الإسلامية"></div>
                <div class="field"><label>📅 الفصل</label><input type="text" id="semester" value="الفصل الثاني"></div>
                <div class="field"><label>🏫 المدرسة</label><input type="text" id="school" value="متوسطة الحسين بن علي"></div>
                <div class="field"><label>👤 اسم الطالب</label><input type="text" id="studentName" placeholder="اسم الطالب"></div>
                <div class="field"><label>⭐ المجموع الكلي</label><input type="text" id="totalScore" value="30"></div>
            </div>

            <!-- الأسئلة -->
            <h3>✍️ الأسئلة المقالية <span id="qCounter" style="background:#eef2fa; padding:3px 12px; border-radius:30px;">0/15</span></h3>
            <div id="questionsContainer"></div>
            
            <div class="action-bar">
                <button id="addQuestionBtn" class="btn-primary">➕ إضافة سؤال</button>
                <button id="saveToLibraryBtn" class="btn-primary">💾 حفظ الاختبار (للمكتبة)</button>
                <button id="exportImageBtn" class="btn-primary">🖼️ تصدير صورة</button>
                <button id="exportPdfBtn" class="btn-primary">📑 تصدير PDF</button>
                <button id="printBtn" class="btn-secondary">🖨️ طباعة</button>
            </div>
            <div id="warningMsg" style="color:#c25a2c; font-size:0.8rem; margin-top:5px;"></div>
        </div>

        <!-- معاينة الورقة -->
        <div class="preview-area">
            <div class="preview-title">📄 معاينة ورقة الاختبار</div>
            <div id="examPreview" class="exam-sheet">جاري التحميل...</div>
        </div>
    </div>

    <!-- تبويب الاختبارات المحفوظة -->
    <div id="tab-saved" class="tab-pane">
        <div style="background: rgba(255,255,255,0.96); border-radius: 28px; padding: 25px;">
            <h2 style="color:#1e3a5f;">📚 الاختبارات المحفوظة</h2>
            <div id="savedList"></div>
        </div>
    </div>
    <footer class="no-print">✧ جميع الأزرار تعمل بكفاءة | حفظ تلقائي للبيانات ✧</footer>
</div>

<script>
    // ======================= البيانات العامة =======================
    let questions = ["اشرح معنى المواطنة وأهميتها.", "ما أثر التقنية على التعليم؟"];
    let savedExams = [];
    
    // عناصر DOM
    let questionsContainer, previewDiv, counterSpan, warningSpan;
    let examNameInput, subjectInput, semesterInput, schoolInput, studentInput, totalInput;
    
    // ======================= دوال مساعدة =======================
    function saveCurrentState() {
        const state = {
            questions: questions,
            examName: examNameInput.value,
            subject: subjectInput.value,
            semester: semesterInput.value,
            school: schoolInput.value,
            studentName: studentInput.value,
            totalScore: totalInput.value
        };
        localStorage.setItem('autoExamState', JSON.stringify(state));
    }
    
    function loadSavedState() {
        const saved = localStorage.getItem('autoExamState');
        if(saved) {
            try {
                const s = JSON.parse(saved);
                if(s.questions && s.questions.length) questions = s.questions;
                examNameInput.value = s.examName || "الاختبار النهائي";
                subjectInput.value = s.subject || "التربية الإسلامية";
                semesterInput.value = s.semester || "الفصل الثاني";
                schoolInput.value = s.school || "متوسطة الحسين بن علي";
                studentInput.value = s.studentName || "";
                totalInput.value = s.totalScore || "30";
            } catch(e) {}
        }
        if(!questions.length) questions = ["اشرح معنى المواطنة.", "ما أهمية العلم؟"];
    }
    
    function loadSavedExams() {
        const stored = localStorage.getItem('savedExams');
        if(stored) {
            try { savedExams = JSON.parse(stored); } catch(e) { savedExams = []; }
        }
        renderSavedList();
    }
    
    function saveExamsToStorage() {
        localStorage.setItem('savedExams', JSON.stringify(savedExams));
        renderSavedList();
    }
    
    function escapeHtml(txt) { if(!txt) return ''; return txt.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    function updateCounter() {
        let len = questions.length;
        counterSpan.innerText = `${len}/15`;
        if(len >= 15) {
            warningSpan.innerText = "⚠️ الحد الأقصى 15 سؤال";
            document.getElementById('addQuestionBtn').disabled = true;
        } else {
            warningSpan.innerText = "";
            document.getElementById('addQuestionBtn').disabled = false;
        }
    }
    
    // ======================= عرض الأسئلة في محرر الإدخال =======================
    function renderQuestionsEditor() {
        questionsContainer.innerHTML = '';
        for(let i=0; i<questions.length; i++) {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="q-num">${i+1}</div>
                <div class="q-text">
                    <textarea rows="2" placeholder="نص السؤال...">${escapeHtml(questions[i])}</textarea>
                </div>
                <button class="btn-delete" data-index="${i}">✖ حذف</button>
            `;
            const textarea = card.querySelector('textarea');
            textarea.addEventListener('input', (function(idx) {
                return function(e) { questions[idx] = e.target.value; renderPreview(); saveCurrentState(); };
            })(i));
            const delBtn = card.querySelector('.btn-delete');
            delBtn.addEventListener('click', (function(idx) {
                return function() { 
                    if(questions.length === 1) { alert("يجب أن يبقى سؤال واحد على الأقل"); return; }
                    questions.splice(idx, 1); 
                    renderQuestionsEditor(); 
                    updateCounter(); 
                    renderPreview(); 
                    saveCurrentState();
                };
            })(i));
            questionsContainer.appendChild(card);
        }
        updateCounter();
    }
    
    // ======================= معاينة الورقة =======================
    function renderPreview() {
        const name = examNameInput.value || "اختبار";
        const subj = subjectInput.value || "—";
        const sem = semesterInput.value || "—";
        const sch = schoolInput.value || "متوسطة الحسين بن علي";
        const stu = studentInput.value || "";
        const total = totalInput.value || "30";
        
        const infoHtml = `
            <div class="info-box">
                <div class="info-items">
                    <div class="info-badge"><strong>📋 الاختبار:</strong> ${escapeHtml(name)}</div>
                    <div class="info-badge"><strong>📚 المادة:</strong> ${escapeHtml(subj)}</div>
                    <div class="info-badge"><strong>🗓️ الفصل:</strong> ${escapeHtml(sem)}</div>
                    <div class="info-badge"><strong>🏫 المدرسة:</strong> ${escapeHtml(sch)}</div>
                </div>
                <div class="score-box">
                    <div style="font-size:0.7rem;">درجة الطالب</div>
                    <div class="fraction">
                        <div class="numerator">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
                        <div>${escapeHtml(total)}</div>
                    </div>
                    <div style="font-size:0.6rem;">يكتبها المعلم</div>
                </div>
            </div>
            <div class="student-row">
                <strong>👨‍🎓 اسم الطالب :</strong> ${escapeHtml(stu)}
            </div>
            <div class="answer-header">📌 أجب عن الأسئلة التالية :</div>
            <div id="previewQuestionsList"></div>
            <div style="margin-top: 25px; border-top:1px solid #e2edf7; padding-top:12px; font-size:0.8rem;">📝 مساحة الإجابة</div>
        `;
        previewDiv.innerHTML = infoHtml;
        
        const qListDiv = document.getElementById('previewQuestionsList');
        if(qListDiv) {
            qListDiv.innerHTML = '';
            questions.forEach((q, idx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'preview-question';
                qDiv.innerHTML = `<div class="preview-num">${idx+1}</div><div style="flex:1">${escapeHtml(q)}</div>`;
                qListDiv.appendChild(qDiv);
            });
        }
    }
    
    // ======================= إضافة سؤال =======================
    function addQuestion() {
        if(questions.length >= 15) { alert("الحد الأقصى 15 سؤال"); return; }
        questions.push("سؤال مقالي جديد: اكتب نص السؤال...");
        renderQuestionsEditor();
        renderPreview();
        saveCurrentState();
    }
    
    // ======================= حفظ الاختبار الحالي في المكتبة =======================
    function saveCurrentToLibrary() {
        let examName = examNameInput.value.trim();
        if(!examName) { alert("يرجى كتابة اسم الاختبار"); return; }
        if(questions.length === 0) { alert("لا توجد أسئلة"); return; }
        const newExam = {
            id: Date.now(),
            name: examName,
            subject: subjectInput.value,
            semester: semesterInput.value,
            school: schoolInput.value,
            studentName: studentInput.value,
            totalScore: totalInput.value,
            questions: [...questions]
        };
        savedExams.push(newExam);
        saveExamsToStorage();
        alert(`✅ تم حفظ "${examName}" في المكتبة`);
    }
    
    // ======================= عرض قائمة الاختبارات المحفوظة =======================
    function renderSavedList() {
        const listDiv = document.getElementById('savedList');
        if(!listDiv) return;
        if(savedExams.length === 0) {
            listDiv.innerHTML = '<div class="empty-msg">📭 لا توجد اختبارات محفوظة. قم بإنشاء اختبار وحفظه.</div>';
            return;
        }
        let html = '';
        for(let exam of savedExams) {
            html += `
                <div class="exam-card">
                    <div><strong>${escapeHtml(exam.name)}</strong> | ${escapeHtml(exam.subject)} | الفصل: ${escapeHtml(exam.semester)} | ${exam.questions.length} سؤال</div>
                    <div>
                        <button class="small-btn print" data-id="${exam.id}">🖨️ طباعة</button>
                        <button class="small-btn pdf" data-id="${exam.id}">📑 PDF</button>
                        <button class="small-btn delete" data-id="${exam.id}">🗑️ حذف</button>
                    </div>
                </div>
            `;
        }
        listDiv.innerHTML = html;
        
        // ربط الأزرار
        document.querySelectorAll('#savedList .small-btn.print').forEach(btn => {
            btn.onclick = () => {
                let id = parseInt(btn.getAttribute('data-id'));
                let exam = savedExams.find(e => e.id === id);
                if(exam) printExam(exam);
            };
        });
        document.querySelectorAll('#savedList .small-btn.pdf').forEach(btn => {
            btn.onclick = async () => {
                let id = parseInt(btn.getAttribute('data-id'));
                let exam = savedExams.find(e => e.id === id);
                if(exam) await exportExamPDF(exam);
            };
        });
        document.querySelectorAll('#savedList .small-btn.delete').forEach(btn => {
            btn.onclick = () => {
                let id = parseInt(btn.getAttribute('data-id'));
                if(confirm("حذف الاختبار نهائياً؟")) {
                    savedExams = savedExams.filter(e => e.id !== id);
                    saveExamsToStorage();
                }
            };
        });
    }
    
    // وظائف الطباعة والتصدير للاختبارات المحفوظة
    function generateExamHTML(exam, studentOverride) {
        const name = exam.name || "اختبار";
        const subj = exam.subject || "—";
        const sem = exam.semester || "—";
        const sch = exam.school || "متوسطة الحسين بن علي";
        const stu = studentOverride !== undefined ? studentOverride : (exam.studentName || "");
        const total = exam.totalScore || "30";
        const qs = exam.questions || [];
        
        let qHtml = '';
        qs.forEach((q, idx) => {
            qHtml += `<div style="display:flex; gap:12px; border-bottom:1px solid #ccc; padding-bottom:8px; margin-bottom:8px;">
                        <div style="background:#eef2ff; width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${idx+1}</div>
                        <div style="flex:1">${escapeHtml(q)}</div>
                      </div>`;
        });
        
        return `
            <div style="font-family:'Segoe UI', 'Cairo'; direction:rtl;">
                <div style="background:#ecf2f9; border-radius:16px; padding:12px 18px; display:flex; justify-content:space-between; flex-wrap:wrap; margin-bottom:20px;">
                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <div style="background:#fff; padding:4px 14px; border-radius:30px;"><strong>📋 الاختبار:</strong> ${escapeHtml(name)}</div>
                        <div style="background:#fff; padding:4px 14px; border-radius:30px;"><strong>📚 المادة:</strong> ${escapeHtml(subj)}</div>
                        <div style="background:#fff; padding:4px 14px; border-radius:30px;"><strong>🗓️ الفصل:</strong> ${escapeHtml(sem)}</div>
                        <div style="background:#fff; padding:4px 14px; border-radius:30px;"><strong>🏫 المدرسة:</strong> ${escapeHtml(sch)}</div>
                    </div>
                    <div style="background:#fff; border-radius:14px; padding:4px 15px; text-align:center;">
                        <div style="font-size:0.7rem;">درجة الطالب</div>
                        <div style="border-bottom:2px solid #2c6e2c; font-size:1.3rem; font-weight:bold; padding:0 10px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div>
                        <div>${escapeHtml(total)}</div>
                        <div style="font-size:0.6rem;">يكتبها المعلم</div>
                    </div>
                </div>
                <div style="background:#f5f9fe; border-radius:14px; padding:10px 16px; margin-bottom:18px;">
                    <strong>👨‍🎓 اسم الطالب :</strong> ${escapeHtml(stu)}
                </div>
                <div style="font-weight:bold; font-size:1rem; border-right:3px solid #2c6e9e; padding-right:10px; margin:15px 0 12px;">📌 أجب عن الأسئلة التالية :</div>
                ${qHtml}
                <div style="margin-top:25px; border-top:1px solid #ddd; padding-top:12px;">📝 مساحة الإجابة</div>
            </div>
        `;
    }
    
    function printExam(exam) {
        let content = generateExamHTML(exam, exam.studentName);
        let win = window.open('', '_blank');

    async function exportExamPDF(exam) {
        let tempDiv = document.createElement('div');

        tempDiv.style.left = '-9999px';
        tempDiv.style.width = '800px';
        tempDiv.style.background = 'white';
        tempDiv.style.padding = '20px';
        tempDiv.innerHTML = generateExamHTML(exam, exam.studentName);
        document.body.appendChild(tempDiv);
        let canvas = await html2canvas(tempDiv, { scale: 2.5, backgroundColor: '#ffffff' });
        let imgData = canvas.toDataURL('image/png');
        let { jsPDF } = window.jspdf;
        let imgWidth = 210;
        let imgHeight = (canvas.height * imgWidth) / canvas.width;
        let pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
        pdf.save(`${exam.name}.pdf`);
        document.body.removeChild(tempDiv);
    }

    // ======================= ربط المدخلات بالتحديث التلقائي =======================
    function bindInputs() {
        let inputs = [examNameInput, subjectInput, semesterInput, schoolInput, studentInput, totalInput];
        inputs.forEach(inp => {
            inp.addEventListener('input', () => { renderPreview(); saveCurrentState(); });
        });
    }
    
    // ======================= تبديل التبويب =======================
    window.showTab = function(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(tab === 'create') {
            document.getElementById('tab-create').classList.add('active');
            document.querySelector('.tab-btn[onclick="showTab(\'create\')"]').classList.add('active');
        } else {
            document.getElementById('tab-saved').classList.add('active');
            document.querySelector('.tab-btn[onclick="showTab(\'saved\')"]').classList.add('active');
            renderSavedList();
        }
    };
    
    // ======================= بدء التشغيل =======================
    window.onload = function() {
        questionsContainer = document.getElementById('questionsContainer');
        previewDiv = document.getElementById('examPreview');
        counterSpan = document.getElementById('qCounter');
        warningSpan = document.getElementById('warningMsg');
        examNameInput = document.getElementById('examName');
        subjectInput = document.getElementById('subject');
        semesterInput = document.getElementById('semester');
        schoolInput = document.getElementById('school');
        studentInput = document.getElementById('studentName');
        totalInput = document.getElementById('totalScore');
        
        loadSavedState();
        loadSavedExams();
        bindInputs();
        renderQuestionsEditor();
        renderPreview();
        
        document.getElementById('addQuestionBtn').onclick = addQuestion;
        document.getElementById('saveToLibraryBtn').onclick = saveCurrentToLibrary;
        document.getElementById('exportImageBtn').onclick = exportCurrentImage;
        document.getElementById('exportPdfBtn').onclick = exportCurrentPDF;
        document.getElementById('printBtn').onclick = printCurrent;
    };
