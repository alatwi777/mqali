<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>منصة الاختبارات التفاعلية | متوسطة الحسين بن علي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            padding: 25px 20px;
        }

        .exam-platform {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffffdd;
            backdrop-filter: blur(3px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Header cliche */
        .header-cliche {
            background: linear-gradient(135deg, #0b2b44, #1a4a6f);
            padding: 1rem 2rem;
            text-align: center;
            color: white;
            border-bottom: 4px solid #ffc107;
        }
        .header-cliche h2 { font-size: 1.4rem; font-weight: 700; }
        .header-cliche p { font-size: 0.85rem; opacity: 0.9; }

        /* Tabs */
        .tabs-section {
            display: flex;
            gap: 12px;
            padding: 20px 30px 0 30px;
            background: #f8fafd;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #e9ecef;
            border: none;
            padding: 12px 28px;
            font-weight: 700;
            border-radius: 40px 40px 20px 20px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .tab-btn.active {
            background: #ffffff;
            color: #1e6f3f;
            border-bottom: 3px solid #2e7d32;
        }
        .tab-content { display: none; padding: 30px; background: #ffffff; border-radius: 0 0 2rem 2rem; animation: fadeSlide 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }

        .card-panel {
            background: #fefefe;
            border-radius: 28px;
            padding: 1.5rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid #eef2f6;
        }
        .btn {
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: #1e6f3f; color: white; }
        .btn-primary:hover { background: #0f552f; transform: translateY(-2px); }
        .btn-secondary { background: #ffb74d; color: #3e2a1f; }
        .btn-outline { border: 1.5px solid #2c7a4a; background: white; color: #2c7a4a; }
        .btn-danger { background: #d32f2f; color: white; }
        .question-item {
            background: #f9fafc;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 20px;
            border-right: 6px solid #2e7d32;
        }
        textarea { width: 100%; border-radius: 24px; border: 1px solid #cfdfed; padding: 12px; }
        .student-answer-area { background: #fef7e0; border-radius: 20px; padding: 15px; margin-top: 10px; }
        .result-navigation { display: flex; align-items: center; justify-content: space-between; background: #eef3fa; padding: 12px 20px; border-radius: 60px; margin-bottom: 20px; flex-wrap: wrap; }
        .answer-preview-card { background: white; border-radius: 28px; padding: 20px; max-height: 550px; overflow-y: auto; }
        .grade-input-small { width: 80px; padding: 5px; border-radius: 20px; text-align: center; }
        
        /* Modal نافذة بيانات الطالب */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
 backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            border-radius: 48px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-card h3 { margin-bottom: 20px; color: #1e6f3f; }
        .modal-card input {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid #ccc;
        }
        .teacher-icon {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 28px;
            color: #ffb74d;
            cursor: pointer;
            background: #f0f0f0;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .teacher-icon:hover { background: #ffb74d; color: white; transform: scale(1.05); }
        footer { background: #f1f5f9; text-align: center; padding: 12px; font-size: 0.75rem; }
        @media (max-width: 760px) { .header-cliche { padding: 1rem; } .tabs-section { padding: 15px; } }
        .locked-message { background: #fff3e0; padding: 15px; border-radius: 28px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="exam-platform">
    <!-- الكليشه العلوية فقط بدون بيانات الطالب -->
    <div class="header-cliche">
        <div>
            <h2>المملكة العربية السعودية</h2>
            <p>وزارة التعليم | إدارة منطقة تبوك | متوسطة الحسين بن علي</p>
        </div>
    </div>

    <!-- تبويبات (الطالب هو الظاهر افتراضياً) -->
    <div class="tabs-section">
        <button class="tab-btn active" data-tab="studentTab"><i class="fas fa-user-edit"></i> الطالب</button>
        <button class="tab-btn" data-tab="teacherTab"><i class="fas fa-chalkboard-teacher"></i> المعلم</button>
    </div>

    <!-- تبويب الطالب -->
    <div id="studentTab" class="tab-content active">
        <div class="card-panel">
            <h3><i class="fas fa-question-circle"></i> أسئلة الاختبار المقالية</h3>
            <div id="studentQuestionsArea"></div>
            <div id="studentSubmitArea">
                <button id="submitStudentAnswers" class="btn btn-primary"><i class="fas fa-paper-plane"></i> إرسال الإجابات وإنهاء الاختبار</button>
            </div>
            <div id="studentSubmitMsg"></div>
            <div id="studentLockedMsg" class="locked-message" style="display:none;"></div>
        </div>
    </div>

    <!-- تبويب المعلم (مخفي وحمايته برقم سري) -->
    <div id="teacherTab" class="tab-content">
        <div class="card-panel" id="teacherLockPanel">
            <h3><i class="fas fa-lock"></i> الدخول لمنطقة المعلم</h3>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="password" id="teacherPasswordInput" placeholder="أدخل الرقم السري" style="width: 200px;">
                <button id="unlockTeacherBtn" class="btn btn-primary">فتح الوصول</button>
                <button id="setPasswordBtn" class="btn btn-outline">تعيين رقم سري جديد</button>
            </div>
            <div id="teacherLockMsg" style="margin-top: 10px; color: red;"></div>
        </div>
        <div id="teacherContent" style="display: none;">
            <!-- قسم إنشاء الأسئلة -->
            <div class="card-panel">
                <h3><i class="fas fa-pen-alt"></i> إنشاء أسئلة مقالية</h3>
                <div id="questionsContainerTeacher"></div>
                <div style="display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap;">
                    <button id="addQuestionBtn" class="btn btn-primary"><i class="fas fa-plus-circle"></i> إضافة سؤال</button>
                    <button id="saveExamBtn" class="btn btn-secondary"><i class="fas fa-save"></i> حفظ الأسئلة</button>
                </div>
                <div id="questionsStats" style="background: #e8f0fe; padding: 12px; border-radius: 28px; font-weight: bold;"></div>
                <div id="teacherMsg" style="margin-top: 15px;"></div>
            </div>
            <!-- النتائج والإجابات -->
            <div class="card-panel">
                <h3><i class="fas fa-chart-line"></i> النتائج والإجابات (تصحيح يدوي)</h3>
                <div class="result-navigation">
                    <div><i class="fas fa-scroll"></i> <strong>التنقل بين الطلاب:</strong></div>
                    <div>
                        <button id="prevAnswerBtn"><i class="fas fa-chevron-right"></i> السابق</button>
                        <span id="answerCounter" style="margin: 0 10px;">الطالب 1 / 1</span>
                        <button id="nextAnswerBtn">التالي <i class="fas fa-chevron-left"></i></button>
                    </div>
                    <button id="exportGradesBtn" class="btn btn-outline"><i class="fas fa-download"></i> تصدير (الاسم + الدرجة)</button>
                    <button id="printResultsBtn" class="btn btn-outline"><i class="fas fa-print"></i> طباعة كاملة</button>
                </div>
                <div id="answersPreviewArea" class="answer-preview-card">
                    <p>لا توجد إجابات بعد</p>
                </div>
            </div>
        </div>
    </div>
    <footer>منصة تفاعلية - حفظ تلقائي</footer>
</div>

<script>
    // ---------- المتغيرات العامة ----------
    let examQuestions = [];          
    let studentAnswersList = [];     
    let currentAnswerIndex = 0;
    let teacherSecret = localStorage.getItem('teacher_secret') || "";   // فارغ في البداية، يتعين أول مرة
    let isTeacherUnlocked = false;
    let currentStudentData = { name: "", grade: "", subject: "" };
    let hasStudentSubmitted = false;      // هل هذا الطالب (باسمه وصفه) سبق له الإرسال؟
    let studentSubmitLocked = false;      // قفل الواجهة

    // عناصر DOM
    const teacherContainer = document.getElementById('questionsContainerTeacher');
    const studentArea = document.getElementById('studentQuestionsArea');
    const previewArea = document.getElementById('answersPreviewArea');
    const teacherContentDiv = document.getElementById('teacherContent');
    const teacherLockMsg = document.getElementById('teacherLockMsg');
    const submitBtn = document.getElementById('submitStudentAnswers');
    const studentSubmitMsgDiv = document.getElementById('studentSubmitMsg');
    const studentLockedMsgDiv = document.getElementById('studentLockedMsg');

    // ---------- دوال مساعدة ----------
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;});}

    function saveAllToLocal() {
        localStorage.setItem('exam_questions', JSON.stringify(examQuestions));
        localStorage.setItem('student_submissions', JSON.stringify(studentAnswersList));
        updateStats();
    }

    function updateStats() {
        const statsDiv = document.getElementById('questionsStats');
        if(statsDiv) {
            let total = examQuestions.reduce((sum, q) => sum + (parseFloat(q.grade) || 0), 0);
            statsDiv.innerHTML = `<i class="fas fa-calculator"></i> عدد الأسئلة: ${examQuestions.length} | مجموع الدرجات: ${total}`;
        }
        localStorage.setItem('exam_questions', JSON.stringify(examQuestions));
    }

    // عرض أسئلة المعلم
    function renderTeacherQuestions() {
        if(!teacherContainer) return;
        if(examQuestions.length === 0) {
            teacherContainer.innerHTML = '<div style="background:#f1f8e9; padding:20px; border-radius:24px;">📌 لا توجد أسئلة، أضف سؤالاً جديداً</div>';
            updateStats();
            return;
        }
        let html = '';
        examQuestions.forEach((q, idx) => {
            html += `
                <div class="question-item" data-qidx="${idx}">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>السؤال ${idx+1}</strong>
                        <button class="btn btn-outline removeQuestionBtn" data-idx="${idx}" style="background:#ffe0e0;"><i class="fas fa-trash-alt"></i> حذف</button>
                    </div>
                    <label>نص السؤال المقالي:</label>
                    <textarea class="teacher-question-text" data-idx="${idx}" placeholder="اكتب السؤال...">${escapeHtml(q.questionText)}</textarea>
                    <label>الدرجة:</label>
                    <input type="number" class="teacher-grade-input" data-idx="${idx}" value="${q.grade}" min="0" max="30" step="0.5" style="width:100px;">
                </div>
            `;
        });
        teacherContainer.innerHTML = html;
        // أحداث الحذف والتعديل
        document.querySelectorAll('.removeQuestionBtn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.getAttribute('data-idx'));
                examQuestions.splice(idx, 1);
                renderTeacherQuestions();
                saveAllToLocal();
                renderStudentQuestionsUI();
            });
        });
        document.querySelectorAll('.teacher-question-text').forEach(txt => {
            txt.addEventListener('input', function() {
                let idx = parseInt(this.getAttribute('data-idx'));
                examQuestions[idx].questionText = this.value;
                updateStats(); saveAllToLocal(); renderStudentQuestionsUI();
            });
        });
        document.querySelectorAll('.teacher-grade-input').forEach(inp => {
            inp.addEventListener('change', function() {
                let idx = parseInt(this.getAttribute('data-idx'));
                let val = parseFloat(this.value);
                examQuestions[idx].grade = isNaN(val)?0:val;
                updateStats(); saveAllToLocal(); renderStudentQuestionsUI();
            });
        });
        updateStats();
    }

    // عرض أسئلة للطالب (مع تعطيل إذا كان قد أرسل)
    function renderStudentQuestionsUI() {
        if(!studentArea) return;
        if(examQuestions.length === 0) {
            studentArea.innerHTML = '<p style="background:#fff3e0; padding:20px;">📢 لم يقم المعلم بإرسال الأسئلة بعد.</p>';
            return;
        }
        if(studentSubmitLocked) {
            studentArea.innerHTML = `<div class="locked-message"><i class="fas fa-ban"></i> لقد أنهيت الاختبار مسبقاً. لا يمكنك تغيير الإجابات.<br>如需重考، يرجى الاتصال بالمعلم (الرقم السري).</div>`;
            return;
        }
        let html = `<div><strong>⚡ أجب كتابة بالقلم:</strong></div>`;
        examQuestions.forEach((q, idx) => {
            let savedVal = (localStorage.getItem(`temp_answer_${idx}`) || '');
            html += `
                <div class="question-item">
                    <div><strong>س${idx+1}:</strong> ${escapeHtml(q.questionText)} <span class="grade-badge" style="background:#f5a623;">الدرجة: ${q.grade}</span></div>
                    <div class="student-answer-area">
                        <textarea id="studentAns_${idx}" rows="3" placeholder="اكتب إجابتك هنا...">${escapeHtml(savedVal)}</textarea>
                    </div>
                </div>
            `;
        });
        studentArea.innerHTML = html;
        // حفظ تلقائي لمسودة الطالب (إذا لم يكن مقفلاً)
        if(!studentSubmitLocked) {
            for(let i=0; i<examQuestions.length; i++) {
                let ta = document.getElementById(`studentAns_${i}`);
                if(ta) {
                    ta.addEventListener('input', function() {
                        localStorage.setItem(`temp_answer_${i}`, this.value);
                    });
                }
            }
        } else {
            // تعطيل الحقول
            for(let i=0; i<examQuestions.length; i++) {
                let ta = document.getElementById(`studentAns_${i}`);
                if(ta) ta.disabled = true;
            }
        }
    }

    // عرض النتائج داخل المعلم
    function renderResultsPreview() {
        if(!previewArea) return;
        if(studentAnswersList.length === 0) {
            previewArea.innerHTML = '<p>📭 لا توجد إجابات مرسلة بعد.</p>';
            document.getElementById('answerCounter').innerText = `0 / 0`;
            return;
        }
        if(currentAnswerIndex >= studentAnswersList.length) currentAnswerIndex = studentAnswersList.length-1;
        if(currentAnswerIndex < 0) currentAnswerIndex = 0;
        const student = studentAnswersList[currentAnswerIndex];
        document.getElementById('answerCounter').innerText = `الطالب ${currentAnswerIndex+1} / ${studentAnswersList.length}`;
        
        let html = `<div><h4><i class="fas fa-user"></i> الاسم: ${escapeHtml(student.studentName)} | الصف: ${student.studentGrade} | المادة: ${student.studentSubject}</h4>`;
        html += `<p>📅 تاريخ الإرسال: ${student.submittedAt}</p><hr>`;
        student.answers.forEach((ans, idx) => {
            let manualGrade = (ans.manualGrade !== undefined && ans.manualGrade !== null) ? ans.manualGrade : (ans.gradeValue || 0);
            html += `
                <div style="margin-bottom: 20px; border-right: 3px solid #2196f3; padding-right: 12px;">
                    <strong>س${idx+1}:</strong> ${escapeHtml(ans.questionText)} <br/>
                    <div style="background:#fff3e0; padding:10px; border-radius:16px;">
                        <i class="fas fa-pen-fancy"></i> <strong>إجابة الطالب:</strong><br/> ${escapeHtml(ans.answerText) || "لم يقدم إجابة"}
                    </div>
                    <div style="margin-top: 10px;">
                        <label>الدرجة التي يمنحها المعلم: </label>
                        <input type="number" class="grade-input-small manual-grade-input" data-std-index="${currentAnswerIndex}" data-qidx="${idx}" value="${manualGrade}" step="0.5" min="0" max="${ans.gradeValue}" style="width:90px;">
                        <span> من ${ans.gradeValue}</span>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        previewArea.innerHTML = html;

        document.querySelectorAll('.manual-grade-input').forEach(inp => {
            inp.addEventListener('change', function() {
                let stdIdx = parseInt(this.getAttribute('data-std-index'));
                let qIdx = parseInt(this.getAttribute('data-qidx'));
                let newGrade = parseFloat(this.value);
                if(!isNaN(newGrade) && studentAnswersList[stdIdx] && studentAnswersList[stdIdx].answers[qIdx]) {
                    studentAnswersList[stdIdx].answers[qIdx].manualGrade = newGrade;
                    saveAllToLocal();
                }
            });
        });
    }

    // إرسال الطالب
    function submitFinalExam() {
        if(studentSubmitLocked) { alert("لا يمكنك إعادة الإرسال، لقد أنهيت الاختبار مسبقاً"); return; }
        if(examQuestions.length === 0) { alert("لا توجد أسئلة متاحة"); return; }
        if(!currentStudentData.name || !currentStudentData.grade || !currentStudentData.subject) {
            alert("بيانات الطالب غير مكتملة، الرجاء إعادة فتح النافذة");
            return;
        }
        // تجميع الإجابات
        let answersArray = [];
        for(let i=0; i<examQuestions.length; i++) {
            let ansText = document.getElementById(`studentAns_${i}`)?.value.trim() || '';
            answersArray.push({
                questionText: examQuestions[i].questionText,
                answerText: ansText,
                gradeValue: examQuestions[i].grade,
                manualGrade: null
            });
        }
        let submission = {
            studentName: currentStudentData.name,
            studentGrade: currentStudentData.grade,
            studentSubject: currentStudentData.subject,
            submittedAt: new Date().toLocaleString(),
            answers: answersArray
        };
        studentAnswersList.push(submission);
        saveAllToLocal();
        // قفل الطالب نهائياً لهذا الجلسة
        studentSubmitLocked = true;
        localStorage.setItem(`student_locked_${currentStudentData.name}_${currentStudentData.grade}`, 'true');
        // مسح المسودات
        for(let i=0; i<examQuestions.length; i++) localStorage.removeItem(`temp_answer_${i}`);
        studentSubmitMsgDiv.innerHTML = '<span style="color:green;"><i class="fas fa-check-circle"></i> تم إرسال الاختبار بنجاح! لا يمكنك تعديل الإجابات مرة أخرى.如需重考، يرجى الضغط على أيقونة المعلم وإدخال الرقم السري.</span>';
        submitBtn.disabled = true;
        renderStudentQuestionsUI();  // يعرض الحقول مقفلة
        renderResultsPreview();      // تحديث النتائج للمعلم
        // عرض رسالة إضافية بالقفل
        studentLockedMsgDiv.style.display = 'block';
        studentLockedMsgDiv.innerHTML = '<i class="fas fa-lock"></i> الاختبار منتهي. لا يمكن إعادة الحل إلا عبر المعلم (الرقم السري).';
    }

    // نافذة إدخال بيانات الطالب (أيقونة المعلم مدمجة)
    function showStudentInfoModal() {
        // التحقق إن كان الطالب قد أرسل مسبقاً وحاول الدخول مجدداً؟
        let modalHtml = `
            <div id="studentModal" class="modal-overlay">
                <div class="modal-card">
                    <div class="teacher-icon" id="teacherIconModal">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <h3><i class="fas fa-user-graduate"></i> بيانات الطالب</h3>
                    <input type="text" id="modalStudentName" placeholder="الاسم" autocomplete="off">
                    <input type="text" id="modalStudentGrade" placeholder="الصف">
                    <input type="text" id="modalStudentSubject" placeholder="المادة">
                    <button id="confirmStudentBtn" class="btn btn-primary" style="margin-top:15px;">دخول الاختبار</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        const modal = document.getElementById('studentModal');
        const confirmBtn = document.getElementById('confirmStudentBtn');
        const teacherIcon = document.getElementById('teacherIconModal');
        
        confirmBtn.addEventListener('click', () => {
            let name = document.getElementById('modalStudentName').value.trim();
            let grade = document.getElementById('modalStudentGrade').value.trim();
            let subject = document.getElementById('modalStudentSubject').value.trim();
            if(!name || !grade || !subject) { alert("الرجاء تعبئة جميع الحقول"); return; }
            // التحقق إذا كان هذا الطالب قد أرسل سابقاً ومقفل
            let lockKey = `student_locked_${name}_${grade}`;
            if(localStorage.getItem(lockKey) === 'true') {
                alert("⚠️ لقد سبق لك إجراء الاختبار ولا يمكنك الدخول مجدداً. الرجاء مراجعة المعلم (الرقم السري).");
                modal.remove();
                return;
            }
            currentStudentData = { name, grade, subject };
            studentSubmitLocked = false;
            submitBtn.disabled = false;
            studentSubmitMsgDiv.innerHTML = '';
            studentLockedMsgDiv.style.display = 'none';
            // إعادة تحميل الأسئلة ومسح المسودات السابقة إن وجدت
            for(let i=0; i<examQuestions.length; i++) localStorage.removeItem(`temp_answer_${i}`);
            renderStudentQuestionsUI();
            modal.remove();
        });
        
        teacherIcon.addEventListener('click', () => {
            modal.remove();
            openTeacherPortal();  // فتح بوابة المعلم
        });
    }

    // فتح بوابة المعلم (مع إمكانية تعيين الرقم السري لأول مرة)
    function openTeacherPortal() {
        // تفعيل تبويب المعلم
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.getAttribute('data-tab') === 'teacherTab') btn.classList.add('active');
        });
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById('teacherTab').classList.add('active');
        // إذا لم يكن هناك رقم سري مخزّن، نطلب تعيينه فوراً
        if(!teacherSecret || teacherSecret === "") {
            let newPass = prompt("لم يتم تعيين رقم سري للمعلم من قبل. الرجاء تعيين رقم سري الآن:");
            if(newPass && newPass.trim()) {
                teacherSecret = newPass.trim();
                localStorage.setItem('teacher_secret', teacherSecret);
                alert("تم تعيين الرقم السري بنجاح");
            } else {
                alert("يجب تعيين رقم سري للدخول إلى لوحة المعلم");
                return;
            }
        }
        // تبقى القفل قائماً حتى يدخل الرقم
        teacherContentDiv.style.display = 'none';
        document.getElementById('teacherLockPanel').style.display = 'block';
        document.getElementById('teacherPasswordInput').value = '';
        teacherLockMsg.innerHTML = '';
    }

    // أحداث المعلم
    document.getElementById('unlockTeacherBtn')?.addEventListener('click', () => {
        let entered = document.getElementById('teacherPasswordInput').value;
        if(entered === teacherSecret) {
            isTeacherUnlocked = true;
            teacherContentDiv.style.display = 'block';
            document.getElementById('teacherLockPanel').style.backgroundColor = '#e8f5e9';
            teacherLockMsg.innerHTML = '<span style="color:green;">✅ تم فتح منطقة المعلم</span>';
            renderResultsPreview();
        } else {
            teacherLockMsg.innerHTML = '<span style="color:red;">❌ الرقم السري غير صحيح</span>';
        }
    });
    document.getElementById('setPasswordBtn')?.addEventListener('click', () => {
        let newPass = prompt("أدخل الرقم السري الجديد للمعلم:");
        if(newPass && newPass.trim()) {
            teacherSecret = newPass.trim();
            localStorage.setItem('teacher_secret', teacherSecret);
            alert("تم تعيين الرقم السري بنجاح");
        }
    });
    document.getElementById('addQuestionBtn')?.addEventListener('click', () => {
        examQuestions.push({questionText: "سؤال مقالي جديد", grade: 5});
        renderTeacherQuestions();
        saveAllToLocal();
        renderStudentQuestionsUI();
    });
    document.getElementById('saveExamBtn')?.addEventListener('click', () => {
        saveAllToLocal();
        renderStudentQuestionsUI();
        document.getElementById('teacherMsg').innerHTML = '<span style="color:green;">✅ تم حفظ الأسئلة وإتاحتها للطلاب.</span>';
        setTimeout(()=> document.getElementById('teacherMsg').innerHTML = '', 2000);
    });
    document.getElementById('submitStudentAnswers')?.addEventListener('click', submitFinalExam);
    document.getElementById('exportGradesBtn')?.addEventListener('click', () => {
        if(studentAnswersList.length===0) { alert("لا توجد بيانات"); return; }
        let csv = [["اسم الطالب", "الدرجة الكلية"]];
        studentAnswersList.forEach(s => {
            let total = s.answers.reduce((sum, a) => sum + (a.manualGrade !== undefined && a.manualGrade !== null ? parseFloat(a.manualGrade) : 0), 0);
            csv.push([s.studentName, total]);
        });
        let blob = new Blob(["\uFEFF" + csv.map(r=>r.join(",")).join("\n")], {type:"text/csv"});
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "درجات_الطلاب.csv"; a.click();
    });
    document.getElementById('printResultsBtn')?.addEventListener('click', () => {
        let win = window.open('','_blank');
        let html = `<html dir="rtl"><head><title>النتائج</title><style>body{font-family:Tajawal;}</style></head><body><h2>نتائج الطلاب</h2>`;
        studentAnswersList.forEach(s=>{
            html+=`<div><h3>${s.studentName} - ${s.studentGrade}</h3>`;
            s.answers.forEach((a,i)=>{
                let final = (a.manualGrade!==undefined && a.manualGrade!==null)? a.manualGrade : "غير مصحح";
                html+=`<p><strong>س${i+1}:</strong> ${a.questionText}<br>الإجابة: ${a.answerText}<br>الدرجة: ${final}/${a.gradeValue}</p>`;
            });
            html+=`</div><hr>`;
        });
        win.document.write(html); win.print();
    });
    document.getElementById('prevAnswerBtn')?.addEventListener('click', () => {
        if(studentAnswersList.length) currentAnswerIndex = (currentAnswerIndex-1+studentAnswersList.length)%studentAnswersList.length;
        renderResultsPreview();
    });
    document.getElementById('nextAnswerBtn')?.addEventListener('click', () => {
        if(studentAnswersList.length) currentAnswerIndex = (currentAnswerIndex+1)%studentAnswersList.length;
        renderResultsPreview();
    });

    // تحميل البيانات وحفظها
    function loadInitialData() {
        let savedQ = localStorage.getItem('exam_questions');
        if(savedQ) examQuestions = JSON.parse(savedQ);
        else examQuestions = [{questionText: "اذكر مفهوم المواطنة الرقمية", grade: 5}];
        let savedSub = localStorage.getItem('student_submissions');
        if(savedSub) studentAnswersList = JSON.parse(savedSub);
        renderTeacherQuestions();
        renderResultsPreview();
        // إظهار نافذة الطالب أولاً
        showStudentInfoModal();
        // ضبط التبويب النشط
        document.querySelector('.tab-btn[data-tab="studentTab"]').click();
    }
    loadInitialData();

    // ربط التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            let tabId = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'teacherTab' && !isTeacherUnlocked) teacherContentDiv.style.display = 'none';
            if(tabId === 'studentTab') renderStudentQuestionsUI();
        });
    });
</script>
</body>
</html>
